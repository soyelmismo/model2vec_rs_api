[package]
name = "model2vec-api"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "model2vec-api"
path = "src/main.rs"

[dependencies]
# Async runtime — minimal features only
tokio = { version = "*", features = ["rt-multi-thread", "net", "io-util", "macros"] }

# HTTP/1.1 request parser — already a transitive dep, now made explicit
httparse = "1"

# Serialization — shared with model2vec-rs (no extra download)
serde = { version = "*", features = ["derive"] }
serde_json = "*"

# Embeddings
model2vec-rs = { version = "*", default-features = false, features = ["local-only", "fancy-regex"] }

# Error handling — shared with model2vec-rs/tokenizers
thiserror = "*"
anyhow = "*"

# Logging — log is already a transitive dep of model2vec-rs
log = "*"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true
