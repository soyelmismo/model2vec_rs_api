name: Release

on:
  push:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-linux:
    uses: ./.github/workflows/ci-linux.yml

  ci-windows:
    uses: ./.github/workflows/ci-windows.yml

  ci-macos:
    uses: ./.github/workflows/ci-macos.yml

  release:
    name: Create Release
    needs: [ci-linux, ci-windows, ci-macos]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Prepare assets
        run: |
          chmod +x ./artifacts/model2vec-api-linux-x86_64-glibc/model2vec-api
          mv ./artifacts/model2vec-api-linux-x86_64-glibc/model2vec-api ./model2vec-api-linux-x86_64-glibc

          chmod +x ./artifacts/model2vec-api-linux-x86_64-musl/model2vec-api
          mv ./artifacts/model2vec-api-linux-x86_64-musl/model2vec-api ./model2vec-api-linux-x86_64-musl

          chmod +x ./artifacts/model2vec-api-linux-aarch64-glibc/model2vec-api
          mv ./artifacts/model2vec-api-linux-aarch64-glibc/model2vec-api ./model2vec-api-linux-aarch64-glibc

          chmod +x ./artifacts/model2vec-api-linux-aarch64-musl/model2vec-api
          mv ./artifacts/model2vec-api-linux-aarch64-musl/model2vec-api ./model2vec-api-linux-aarch64-musl

          mv ./artifacts/model2vec-api-windows-x86_64/model2vec-api.exe ./model2vec-api-windows-x86_64.exe

          chmod +x ./artifacts/model2vec-api-macos-aarch64/model2vec-api
          mv ./artifacts/model2vec-api-macos-aarch64/model2vec-api ./model2vec-api-macos-aarch64

          chmod +x ./artifacts/model2vec-api-macos-x86_64/model2vec-api
          mv ./artifacts/model2vec-api-macos-x86_64/model2vec-api ./model2vec-api-macos-x86_64

      - name: Extract version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep '^version = ' Cargo.toml | sed 's/.*"\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: tag_check
        run: |
          if git tag -l "${{ steps.version.outputs.tag }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate changelog
        id: changelog
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          PREVIOUS_TAG=$(git tag --sort=-creatordate | head -2 | tail -1)
          if [ -z "$PREVIOUS_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${PREVIOUS_TAG}..HEAD"
          fi
          {
            echo "body<<CHANGELOG_EOF"
            echo "## What's Changed"
            echo ""
            git log ${RANGE} --pretty=format:"- %s (%h)" --no-merges
            echo ""
            echo ""
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREVIOUS_TAG:-$(git rev-list --max-parents=0 HEAD)}...${{ steps.version.outputs.tag }}"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create Release
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          body: ${{ steps.changelog.outputs.body }}
          files: |
            ./model2vec-api-linux-x86_64-glibc
            ./model2vec-api-linux-x86_64-musl
            ./model2vec-api-linux-aarch64-glibc
            ./model2vec-api-linux-aarch64-musl
            ./model2vec-api-windows-x86_64.exe
            ./model2vec-api-macos-aarch64
            ./model2vec-api-macos-x86_64
          draft: false
