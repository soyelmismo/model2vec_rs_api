# model2vec-rs API — docker-compose
#
# Zero-config deploy: docker compose up -d
# Serves minishlab/potion-base-8M on port 22671 by default.
#
# SECURITY: Create a .env file with your secrets (see .env.example).
# Secrets are passed via env_file to avoid exposure in docker inspect.
#
# To load multiple models:
#   M2V_MODELS=base:minishlab/potion-base-8M,code:minishlab/potion-code-16M
#
# Local models (bind-mount):
#   volumes:
#     - /host/path:/models/my-model:ro
#   M2V_MODELS=mymodel:/models/my-model

services:
  model2vec-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: model2vec-api:latest

    ports:
      - "${PORT:-22671}:22671"

    env_file:
      - .env

    environment:
      M2V_LISTEN_ADDR: "0.0.0.0:22671"
      M2V_LOG_LEVEL: "${M2V_LOG_LEVEL:-info}"

    volumes:
      - model-cache:/models
      - /containers/globals/swagresolv.conf:/etc/resolv.conf:ro

    user: "65532:65532"
    restart: always

    # healthcheck removed: distroless has no wget/curl.
    # Use the Dockerfile's built-in HEALTHCHECK instead:
    #   CMD ["/model2vec-api", "healthcheck"]

    read_only: true
    tmpfs:
      - /tmp:size=10m

    security_opt:
      - no-new-privileges:true

    cap_drop:
      - ALL

volumes:
  model-cache:
