# model2vec-rs API — docker-compose
#
# Zero-config deploy:  docker compose up -d
# Serves minishlab/potion-base-8M on port 22671 by default.
#
# All env vars use the M2V_ prefix to avoid collisions on the host.
#
# To load multiple models:
#   M2V_MODELS=base:minishlab/potion-base-8M,code:minishlab/potion-code-16M
#
# Local models (bind-mount):
#   volumes:
#     - /host/path:/models/my-model:ro
#   M2V_MODELS=mymodel:/models/my-model

services:
  model2vec-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: model2vec-api:latest

    ports:
      - "${PORT:-22671}:22671"

    environment:
      M2V_MODELS: "${M2V_MODELS:-base:minishlab/potion-base-8M}"
      M2V_LISTEN_ADDR: "0.0.0.0:22671"
      M2V_API_KEY: "${M2V_API_KEY:-}"
      M2V_HF_TOKEN: "${M2V_HF_TOKEN:-}"
      M2V_LOG_LEVEL: "${M2V_LOG_LEVEL:-info}"

    volumes:
      - model-cache:/models

    user: "65532:65532"
    restart: unless-stopped

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:22671/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

volumes:
  model-cache:
